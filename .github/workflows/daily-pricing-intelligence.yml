name: Daily AI Pricing Intelligence

on:
  schedule:
    # Runs at 06:00 UTC every day
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — fetch and classify but do not commit results"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  run-intelligence-pipeline:
    name: Fetch, classify, and record pricing changes
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Check out the current branch (not main)
          ref: ${{ github.ref }}
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run daily pricing intelligence script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/daily-pricing-intelligence.mjs

      - name: Upload digest as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pricing-intelligence-${{ github.run_id }}
          path: |
            artifacts/overpaying-for-ai/src/data/ai-pricing-news.json
            artifacts/overpaying-for-ai/src/data/pricing-history.json
          retention-days: 30

      - name: Commit updated data files
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add \
            artifacts/overpaying-for-ai/src/data/ai-pricing-news.json \
            artifacts/overpaying-for-ai/src/data/pricing-history.json

          # Only commit if there are staged changes
          if git diff --cached --quiet; then
            echo "No data changes detected — nothing to commit."
          else
            git commit -m "chore(data): daily pricing intelligence update [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
