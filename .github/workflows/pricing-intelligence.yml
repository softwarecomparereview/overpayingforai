name: Pricing Intelligence Pipeline

on:
  schedule:
    # Run daily at 08:00 UTC
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "dry_run"
        type: choice
        options:
          - full
          - dry_run
          - manual_no_update
          - reprocess

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            echo "mode=full" >> $GITHUB_OUTPUT
          fi

      - name: Run pricing intelligence pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "Running pipeline in mode: ${{ steps.mode.outputs.mode }}"
          node scripts/daily-pricing-intelligence.mjs --mode ${{ steps.mode.outputs.mode }}

      - name: Upload manual preview artifact (manual_no_update only)
        if: steps.mode.outputs.mode == 'manual_no_update'
        uses: actions/upload-artifact@v4
        with:
          name: manual-autopilot-preview
          path: out/manual-autopilot-preview.json
          retention-days: 7

      - name: Commit updated data files (full mode only)
        if: steps.mode.outputs.mode == 'full'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add artifacts/overpaying-for-ai/src/data/ai-pricing-news.json
          git add artifacts/overpaying-for-ai/src/data/pricing-history.json
          git add artifacts/overpaying-for-ai/src/data/pipeline-run-log.json
          git diff --staged --quiet || git commit -m "chore(data): pricing intelligence run $(date -u +%Y-%m-%d)"
          git push
